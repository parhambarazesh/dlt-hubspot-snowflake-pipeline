name: HubSpot DLT Pipeline

on:
#  schedule:
#    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: hubspot-pipeline
  cancel-in-progress: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
      DESTINATION__SNOWFLAKE__ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      DESTINATION__SNOWFLAKE__USER: ${{ secrets.SNOWFLAKE_USER }}
      DESTINATION__SNOWFLAKE__PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      DESTINATION__SNOWFLAKE__ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      DESTINATION__SNOWFLAKE__WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      DESTINATION__SNOWFLAKE__DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      DESTINATION__SNOWFLAKE__SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Run HubSpot pipeline
        run: python -u hubspot_pipeline.py
