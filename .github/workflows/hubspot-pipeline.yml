name: HubSpot DLT Pipeline

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: hubspot-pipeline
  cancel-in-progress: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare DLT secrets
        run: |
          mkdir -p ~/.dlt

          cat > ~/.dlt/secrets.toml <<'EOF'
          [sources.hubspot]
          api_key = "${{ secrets.HUBSPOT_ACCESS_TOKEN }}"

          [destination.snowflake.credentials]
          username = "${{ vars.SNOWFLAKE_USERNAME }}"
          password = "${{ secrets.SNOWFLAKE_PASSWORD }}"
          host = "${{ vars.SNOWFLAKE_HOST }}"
          database = "${{ vars.SNOWFLAKE_DATABASE }}"
          warehouse = "${{ vars.SNOWFLAKE_WAREHOUSE }}"
          role = "${{ vars.SNOWFLAKE_ROLE }}"
          EOF

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Run HubSpot pipeline
        run: python -u hubspot_pipeline.py
